<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensionary Benefits & Leave Encashment Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7f9; color: #333; margin: 0; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .header-img { text-align: center; margin-bottom: 20px; }
        .header-img img { max-width: 100%; height: auto; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 15px; background-color: #ff4b4b; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-main:hover { background-color: #e63939; }
        
        /* Minimalist Print Button at Top Right */
        .print-btn-container { position: absolute; top: 20px; right: 20px; display: none; }
        .btn-print-minimal { background: none; border: none; color: #0056b3; cursor: pointer; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 5px; padding: 5px; }

        /* Card Styling */
        .benefit-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 25px; }
        .card-header { padding: 12px 20px; color: white; font-weight: bold; font-size: 1.1rem; }
        .card-body { padding: 20px; }
        
        .header-pension { background-color: #2e7d32; }
        .header-family { background-color: #1565c0; }
        .header-leave { background-color: #ed6c02; }

        .line-item { padding: 10px; border-bottom: 1px solid #f0f0f0; font-weight: 500; }
        .line-item:last-child { border-bottom: none; }
        .payable-highlight { background-color: #e8f5e9; font-weight: bold; border-left: 4px solid #2e7d32; margin-top: 10px; }

        .footer { position: fixed; left: 0; bottom: 0; width: 100%; background-color: #f0f2f6; color: #555; text-align: center; padding: 10px; font-size: 14px; border-top: 1px solid #ddd; z-index: 1000; }
        .results-section { display: none; margin-top: 20px; }
        h3 { color: #1a3a5a; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 0; }

        @media print {
            .grid, .btn-main, .print-btn-container, .input-group, .footer, label, input, select { display: none !important; }
            .results-section { display: block !important; }
            .benefit-card { box-shadow: none; border: 1px solid #000; }
            .card-header { color: black !important; border-bottom: 1px solid #000; background: #f0f0f0 !important; }
            .payable-highlight { background-color: #eee !important; border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="printContainer" class="print-btn-container">
        <button class="btn-print-minimal" onclick="window.print()">
            <span>🖨️</span> Print Report
        </button>
    </div>

    <div class="header-img">
        <img src="https://i.ibb.co/C3KcMTy2/ccspension-background-2.jpg" alt="Header Banner">
    </div>

    <div class="grid">
        <div class="col">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter retiree name">
            </div>
            <div class="input-group">
                <label>Type of Retirement</label>
                <select id="retType" onchange="calculateDefaultDOR()">
                    <option value="Superannuation">Superannuation</option>
                    <option value="Voluntary Retirement">Voluntary Retirement</option>
                    <option value="Compulsory Retirement">Compulsory Retirement</option>
                </select>
            </div>
            <div class="input-group">
                <label>Date of Birth (DD/MM/YYYY)</label>
                <input type="date" id="dob" value="1965-10-03" onchange="calculateDefaultDOR()">
            </div>
            <div class="input-group">
                <label>Date of Retirement (DD/MM/YYYY)</label>
                <input type="date" id="dor">
            </div>
        </div>

        <div class="col">
            <div class="input-group">
                <label>Basic Pay (Rs.)</label>
                <input type="number" id="basicPay" value="0">
            </div>
            <div class="input-group">
                <label>Current DA Rate (%)</label>
                <input type="number" id="daPercent" value="0" step="0.1">
            </div>
            <div class="input-group">
                <label>Commutation Opted (%)</label>
                <input type="range" id="commPercent" min="0" max="40" value="0" oninput="this.nextElementSibling.value = this.value">
                <output>0</output>%
            </div>
            <div class="input-group">
                <label>Govt. Accommodation?</label>
                <select id="govtAcc">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
        </div>

        <div class="col">
            <div class="input-group">
                <label>Date of Entry (DD/MM/YYYY)</label>
                <input type="date" id="doj" value="1995-01-01" onchange="calculateDefaultDOR()">
            </div>
            <div class="input-group">
                <label>EL Balance (on D.O.R.)</label>
                <input type="number" id="elBalance" value="0">
            </div>
            <div class="input-group">
                <label>HPL Balance (on D.O.R.)</label>
                <input type="number" id="hplBalance" value="0">
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="generateReport()">Generate Calculation Report</button>

    <div id="results" class="results-section">
        <div class="grid" style="margin-top: 10px; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
            <div>
                <h3>📊 Summary Statistics</h3>
                <p id="resBasicPay"></p>
                <p id="resDates"></p>
                <p id="resService"></p>
                <p id="resELHPL"></p>
            </div>
            <div>
                <h3>📅 Retirement Info</h3>
                <p id="resName"></p>
                <p id="resAgeNext"></p>
            </div>
        </div>
        <br>

        <div class="benefit-card">
            <div class="card-header header-pension">🟢 Part-A) Pensionary Benefits</div>
            <div class="card-body" id="partA"></div>
        </div>

        <div class="benefit-card">
            <div class="card-header header-family">🔵 Part-B) Family Pension</div>
            <div class="card-body" id="partB"></div>
        </div>

        <div class="benefit-card">
            <div class="card-header header-leave">🟠 Part-C) Leave Encashment</div>
            <div class="card-body" id="partC"></div>
        </div>
    </div>
</div>

<div class="footer">
    Developed by: <b>Mithun Biswas</b>, EA, Pension Cell, CGST & C.Ex. Mumbai Central
</div>

<script>
    const commutationTable = {
        20: 9.188, 21: 9.187, 22: 9.186, 23: 9.185, 24: 9.184, 25: 9.183, 26: 9.182, 27: 9.180, 28: 9.178, 29: 9.176,
        30: 9.173, 31: 9.169, 32: 9.164, 33: 9.159, 34: 9.152, 35: 9.145, 36: 9.145, 37: 9.126, 38: 9.116, 39: 9.103,
        40: 9.090, 41: 9.075, 42: 9.059, 43: 9.040, 44: 9.019, 45: 8.996, 46: 8.971, 47: 8.943, 48: 8.913, 49: 8.881,
        50: 8.846, 51: 8.808, 52: 8.768, 53: 8.724, 54: 8.678, 55: 8.627, 56: 8.572, 57: 8.512, 58: 8.446, 59: 8.371,
        60: 8.287, 61: 8.194, 62: 8.093, 63: 7.982, 64: 7.862, 65: 7.731, 66: 7.591, 67: 7.431, 68: 7.262, 69: 7.083,
        70: 6.897, 71: 6.701, 72: 6.499, 73: 6.289, 74: 6.075, 75: 5.857, 76: 5.638, 77: 5.421, 78: 5.205, 79: 4.993,
        80: 4.784, 81: 4.581
    };

    function formatDate(dateObj) {
        if (!dateObj || isNaN(dateObj.getTime())) return "N/A";
        let d = dateObj.getDate();
        let m = dateObj.getMonth() + 1;
        let y = dateObj.getFullYear();
        return (d < 10 ? '0' + d : d) + '/' + (m < 10 ? '0' + m : m) + '/' + y;
    }

    function formatIndianCurrency(num, decimal = true) {
        let x = Math.floor(Math.abs(num)).toString();
        let lastThree = x.substring(x.length - 3);
        let otherNumbers = x.substring(0, x.length - 3);
        if (otherNumbers != '') lastThree = ',' + lastThree;
        let res = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
        let prefix = num < 0 ? "-" : "";
        return prefix + "₹" + res + (decimal ? "." + (num.toFixed(2).split('.')[1]) : "");
    }

    function calculateDefaultDOR() {
        const dobInput = document.getElementById('dob').value;
        if (!dobInput) return;
        const dob = new Date(dobInput);
        const retType = document.getElementById('retType').value;
        if (retType === "Superannuation") {
            let retYear = dob.getFullYear() + 60;
            let retMonth = dob.getMonth();
            if (dob.getDate() === 1) {
                retMonth -= 1;
                if (retMonth < 0) { retMonth = 11; retYear -= 1; }
            }
            const lastDay = new Date(retYear, retMonth + 1, 0).getDate();
            document.getElementById('dor').value = `${retYear}-${String(retMonth + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
        }
    }

    function generateReport() {
        const basic = parseFloat(document.getElementById('basicPay').value);
        const dob = new Date(document.getElementById('dob').value);
        const doj = new Date(document.getElementById('doj').value);
        const dor = new Date(document.getElementById('dor').value);
        const daRate = parseFloat(document.getElementById('daPercent').value);
        const commP = parseFloat(document.getElementById('commPercent').value);
        const retType = document.getElementById('retType').value;

        if (basic <= 0 || isNaN(dob.getTime()) || isNaN(doj.getTime()) || isNaN(dor.getTime())) { 
            alert("Please ensure Basic Pay and all Dates are entered correctly."); 
            return; 
        }

        let start = new Date(doj);
        let inclusiveEnd = new Date(dor);
        inclusiveEnd.setDate(inclusiveEnd.getDate() + 1);
        let yrs = inclusiveEnd.getFullYear() - start.getFullYear();
        let mos = inclusiveEnd.getMonth() - start.getMonth();
        let days = inclusiveEnd.getDate() - start.getDate();
        if (days < 0) { mos--; let prevMonth = new Date(inclusiveEnd.getFullYear(), inclusiveEnd.getMonth(), 0); days += prevMonth.getDate(); }
        if (mos < 0) { yrs--; mos += 12; }

        let periods = yrs * 2;
        if (mos >= 9) periods += 3; else if (mos >= 3) periods += 1;
        periods = Math.min(66, periods);

        const daAmt = basic * (daRate / 100);
        const emoluments = basic + daAmt;
        const pensionBefore = basic / 2;
        const commAmt = Math.ceil((pensionBefore * commP) / 100);
        const residuary = pensionBefore - commAmt;

        let ageOnRetirement = dor.getFullYear() - dob.getFullYear();
        let m = dor.getMonth() - dob.getMonth();
        if (m < 0 || (m === 0 && dor.getDate() < dob.getDate())) { ageOnRetirement--; }
        let ageNext = ageOnRetirement + 1;
        if (retType === "Superannuation" && ageNext < 61) ageNext = 61;

        const factor = commutationTable[ageNext] || 0;
        const lumpSum = Math.ceil(commAmt * 12 * factor);
        const totalGrat = Math.round(Math.min(2500000, (emoluments / 4) * periods));
        const withheld = document.getElementById('govtAcc').value === "Yes" ? Math.ceil(totalGrat * 0.1) : 0;

        const elInput = parseInt(document.getElementById('elBalance').value) || 0;
        const hplInput = parseInt(document.getElementById('hplBalance').value) || 0;
        const elDays = Math.min(300, elInput);
        const gap = 300 - elDays;
        const hplDaysToEncash = Math.min(hplInput, gap);
        const elEncashAmt = ((basic + daAmt) / 30) * elDays;
        const hplEncashAmt = (((basic / 2) + ((basic / 2) * (daRate / 100))) / 30) * hplDaysToEncash;

        document.getElementById('results').style.display = "block";
        document.getElementById('printContainer').style.display = "block";
        
        document.getElementById('resBasicPay').innerHTML = `<b>Basic Pay:</b> ${formatIndianCurrency(basic, false)}`;
        document.getElementById('resDates').innerHTML = `<b>DOB:</b> ${formatDate(dob)} | <b>DOR:</b> ${formatDate(dor)}`;
        document.getElementById('resService').innerHTML = `<b>Qualifying Service:</b> ${yrs} Years ${mos} Months ${days} Days`;
        document.getElementById('resELHPL').innerHTML = `<b>EL used:</b> ${elDays} Days | <b>HPL used:</b> ${hplDaysToEncash} Days`;
        document.getElementById('resName').innerHTML = `<b>Retiree Name:</b> ${document.getElementById('name').value || 'N/A'}`;
        document.getElementById('resAgeNext').innerHTML = `<b>Commutation Age Applied:</b> ${ageNext} Years`;

        document.getElementById('partA').innerHTML = `
            <div class="line-item">1. Monthly Pension before Commutation: ${formatIndianCurrency(pensionBefore)} + DR</div>
            <div class="line-item">2. Commuted Pension (Rounded Up): ${formatIndianCurrency(commAmt)}</div>
            <div class="line-item">3. Residuary Pension after Commutation: ${formatIndianCurrency(residuary)} + DR <br><small style="color:#666;">(Note: DR is applied on basic pension before commutation)</small></div>
            <div class="line-item">4. Commuted Value [Lump sum]: ${formatIndianCurrency(lumpSum, false)}</div>
            <div class="line-item">5. Pension Gratuity Admissible (Rounded): ${formatIndianCurrency(totalGrat)}</div>
            <div class="line-item">6. Amount of Gratuity to be Withheld (Rounded Up): ${formatIndianCurrency(withheld, false)}</div>
            <div class="line-item payable-highlight">7. Net Payable Gratuity: ${formatIndianCurrency(totalGrat - withheld)}</div>
        `;

        document.getElementById('partB').innerHTML = `
            <div class="line-item">1. Enhanced Family Pension: ${formatIndianCurrency(pensionBefore)} + DR</div>
            <div class="line-item">2. Ordinary Family Pension: ${formatIndianCurrency(Math.max(9000, basic * 0.3))} + DR</div>
        `;

        document.getElementById('partC').innerHTML = `
            <div class="line-item">1. Leave Encashment against EL (${elDays} days): ${formatIndianCurrency(elEncashAmt)}</div>
            <div class="line-item">2. Leave Encashment against HPL (${hplDaysToEncash} days): ${formatIndianCurrency(hplEncashAmt)}</div>
            <div class="line-item payable-highlight">3. Total Leave Encashment Payable: ${formatIndianCurrency(elEncashAmt + hplEncashAmt)}</div>
        `;

        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }
    window.onload = calculateDefaultDOR;
</script>
</body>
</html>
