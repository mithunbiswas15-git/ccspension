<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pension Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #219150; }
        #result { margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Pension Project</h2>
    <div class="input-group">
        <label>Current Savings ($)</label>
        <input type="number" id="savings" placeholder="e.g. 5000">
    </div>
    <div class="input-group">
        <label>Monthly Contribution ($)</label>
        <input type="number" id="monthly" placeholder="e.g. 200">
    </div>
    <div class="input-group">
        <label>Years until Retirement</label>
        <input type="number" id="years" placeholder="e.g. 30">
    </div>
    <div class="input-group">
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="e.g. 7">
    </div>
    <button onclick="calculatePension()">Calculate Total</button>

    <div id="result">
        <strong>Estimated Result:</strong>
        <p id="totalAmount"></p>
    </div>
</div>

<script>
    function calculatePension() {
        const P = parseFloat(document.getElementById('savings').value) || 0;
        const PMT = parseFloat(document.getElementById('monthly').value) || 0;
        const t = parseFloat(document.getElementById('years').value) || 0;
        const annualRate = parseFloat(document.getElementById('rate').value) / 100 || 0;
        
        const r = annualRate / 12;
        const n = t * 12;

        // Compound interest formula for principal + monthly contributions
        // Total = P(1+r)^n + PMT * [((1+r)^n - 1) / r]
        const compoundFactor = Math.pow(1 + r, n);
        const futureValue = (P * compoundFactor) + (PMT * (compoundFactor - 1) / r);

        const resultDiv = document.getElementById('result');
        const amountP = document.getElementById('totalAmount');
        
        resultDiv.style.display = 'block';
        amountP.innerText = "In " + t + " years, you will have: $" + futureValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>

</body>
</html>
